# 基本配置

# 是否开启姓名手机号打码
mask_acc: true
# TUI 最大显示高度 null: 自适应高度
tui_max_height: 25
# 尝试拉取预先上传的人脸图片
fetch_uploaded_face: true
# 会话存档路径
session_path: "session/"
# 日志文件路径
log_path: "logs/"
# 试题导出路径
export_path: "export/"
# 人脸图片路径
face_image_path: "faces/"

# --------------------

# 任务执行器配置
# 视频
video:
  # 使能
  enable: true
  # 完成等待时间
  wait: 15
  # 倍速
  speed: 1.0
  # 视频播放汇报率 (没事别改)
  report_rate: 58

# 作业 (章节测验)
work:
  # 使能
  enable: true
  # 是否进行试题导出 可以将 `enable`设置为 false, 从而进行 dry run
  export: false
  # 完成等待时间
  wait: 15
  # 未匹配选项是否随机选择
  fallback_fuzzer: false
  # 作答失败后是否保存
  fallback_save: true

# 文档
document:
  # 使能
  enable: true
  # 完成等待时间
  wait: 15

# 考试
exam:
  # 未匹配选项是否随机选择
  fallback_fuzzer: false
  # 提交前延迟时间
  persubmit_delay: 15
  # 是否需要交互式确认交卷 自动交卷: false 手动确认: true
  confirm_submit: true

# --------------------

# Web 服务配置（服务器全局）
server:
  # 同时执行任务的最大“用户数”（按 owner_id 计数）。
  # - 达到上限后：仍允许访问/提交任务，但任务会进入全局等待队列，按进入时间顺序依次启动
  # - 说明：单个用户本身仍保持“同一时间最多 1 个任务/队列在跑”的限制
  # - 环境变量优先级更高：MAX_CONCURRENT_USERS 可覆盖此值
  max_concurrent_users: 60

# 搜索器选择 (可同时使用多个搜索器, 以 yaml 语法中 list 格式添加, `type`字段决定搜索器类型)
