# --------------------

# Web 打赏与反馈（可选）
# - 页面入口：工作台导航「打赏与反馈」
# - 邮箱反馈：POST /api/feedback/send，会自动附带当前登录用户信息、任务状态、队列状态、日志尾部（最多约 512KB）
# - 安全建议：不要把真实邮箱密码提交到公开仓库；更推荐用环境变量 FEEDBACK_SMTP_* 覆盖这些配置（优先级更高）
feedback:
  mail:
    # SMTP 服务器地址（例如：smtp.qq.com / smtp.163.com / smtp.gmail.com）
    smtp_host: "smtp.qq.com"
    # SMTP 端口：
    # - use_ssl=true：常用 465（SMTP over SSL）
    # - use_ssl=false 且 use_starttls=true：常用 587（STARTTLS）
    smtp_port: 465
    # SMTP 登录账号（通常是发件邮箱地址）
    username: "your-email@example.com"
    # SMTP 登录密码/授权码（建议用“授权码”，不要用网页登录密码）
    password: "your-smtp-app-password"
    # 发件人地址（可留空，默认使用 username）
    from_addr: "your-email@example.com"
    # 收件人地址（可留空，默认发给 username；建议填你的反馈接收邮箱）
    to_addr: "your-email@example.com"
    # 是否使用 SSL 直连（端口通常为 465）
    use_ssl: true
    # 是否使用 STARTTLS（端口通常为 587；use_ssl=true 时保持 false）
    use_starttls: false
  donate:
    # 页面标题与说明文案
    title: "感谢支持本项目"
    description: "如果这个项目对你有帮助，欢迎打赏支持持续维护与更新。"
    # 打赏二维码图片地址：
    # - 可填写 https://... 的公网图片 URL
    # - 或填写站内静态路径（例如：/static/images/wechat.png，对应文件放到 web/static/images/wechat.png）
    wechat_qr: "/static/images/donate/wechat.png"
    alipay_qr: "/static/images/donate/alipay.png"
    # 可选：额外的打赏跳转链接（例如爱发电/赞助页），为空则不显示按钮
    donate_link: ""
